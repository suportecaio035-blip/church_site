<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/css/styles_default.css">
    <link rel="stylesheet" href="static/css/family.css">
</head>
<body>
    <div class="nav_bar">
        <a id="land" href="land_page.html"><button id="land" class="btn_bar">Página Inicial</button></a>
        <a id="member" href="member.html"><button id="member" class="btn_bar">Lista Membros</button></a>
        <a id="family" href="family.html"><button id="family" class="btn_bar">Familías</button></a>
        <a id="rafflew" href="rafflew.html"><button id="rafflew" class="btn_bar">Sorteio</button></a>
        <a id="birthday" href="birthday.html"><button id="birthday" class="btn_bar">Aniversários</button></a>

        <div class="end">
        <a id="out" href="index.html"><button id="out" class="btn_out">Sair</button></a>
        </div>
    </div>

    <div class="box_land">
        <button type="button" id="abrirCadastroFamilia">Cadastrar família</button>
        <button type="button" id="abrirEdicaoFamilia">Editar família</button>

        <dialog id="cadastroFamilia">
            <form id="formFamilia">
                <label for="sobrenome">Nome da família</label>
                <input type="text" id="sobrenome" name="sobrenome" required>

                <label for="endereco">Endereço</label>
                <input type="text" id="endereco" name="endereco" required>

                <button type="submit">Cadastrar</button>
                <button type="button" id="fecharCadastroFamilia">Cancelar</button>
            </form>
        </dialog>

        <dialog id="edicaoFamilia">
            <form id="formEditarFamilia">
                <label for="familiaEditar">Família</label>
                <select id="familiaEditar" name="familiaEditar" required>
                    <option value="">Selecione uma família</option>
                </select>

                <label for="sobrenomeEditar">Nome da família</label>
                <input type="text" id="sobrenomeEditar" name="sobrenomeEditar" required>

                <label for="enderecoEditar">Endereço</label>
                <input type="text" id="enderecoEditar" name="enderecoEditar" required>

                <button type="submit">Salvar alterações</button>
                <button type="button" id="excluirFamilia">Excluir família</button>
                <button type="button" id="fecharEdicaoFamilia">Cancelar</button>
            </form>
        </dialog>

        <div class="depart">
            <ul id="listaFamilias"></ul>
        </div>
    </div>

    <script type="module" src="static/js/app.js?v=2"></script>
</body>
</html>
